name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Export web
        env:
          EXPO_PUBLIC_BASE_PATH: /study-focus-app
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
        run: npx expo export --platform web

      - name: Verify splash tagline is English only
        run: |
          if grep -r '기억을 정복' dist/_expo/static/js/web/ 2>/dev/null; then
            echo 'ERROR: Korean splash tagline found in web bundle'
            exit 1
          fi
          if ! grep -r 'Conquer your memory' dist/_expo/static/js/web/; then
            echo 'ERROR: English splash tagline missing from web bundle'
            exit 1
          fi

      - name: GitHub Pages SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          echo "<!-- deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) -->" >> dist/index.html
          echo "<!-- deploy $(date -u +%Y-%m-%dT%H:%M:%SZ) -->" >> dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: false
