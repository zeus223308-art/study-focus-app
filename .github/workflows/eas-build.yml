# Build Android APK / iOS IPA on Expo servers (no Mac required).
# Setup: GitHub repo → Settings → Secrets → EXPO_TOKEN
# Create token: https://expo.dev/accounts/[account]/settings/access-tokens

name: EAS Native Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (${{ inputs.platform }})
        run: eas build --platform ${{ inputs.platform }} --profile preview --non-interactive
